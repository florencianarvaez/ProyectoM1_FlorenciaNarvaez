<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Paleta de colores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

    <header>
        <h1>Paleta de colores</h1>
        <p>Paletas de colores aleatorias.</p>
    </header>

    <main>

        <section class="controls">
            <h2>Generar nueva paleta</h2>

            <label for="palette-size">
                Tamaño de la paleta
            </label>

            <select id="palette-size">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>

            <button id="generate-btn">
                Generar
            </button>
        </section>

        <section class="palette-section">
            <h2>Paleta generada</h2>

            <div class="palette" id="palette-container">
    <!-- Acá se generan los colores -->
            </div>

        </section>

    </main>

    <footer>
        <p>Proyecto Integrador - Módulo 1 - Programación</p>
    </footer>
    <div id="toast" class="toast">Color copiado</div>

    <script src="./JS/script.js"></script>

</body>
</html>
